name: 早盘扫描
on:
  schedule:
    # 北京时间周一至周五 9:25 = UTC 1:25
    - cron: '25 1 * * 1-5'
  workflow_dispatch:  # 允许手动触发测试

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install akshare pandas numpy requests pyyaml

      - name: 早盘扫描
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          SERVERCHAN_KEY1: ${{ secrets.SERVERCHAN_KEY1 }}
        run: python scan_headless.py
